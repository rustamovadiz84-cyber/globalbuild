<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - GlobalBuild</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 80%, rgba(56, 189, 248, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(236, 72, 153, 0.05) 0%, transparent 50%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            33% {
                transform: translate(-5%, -5%) rotate(1deg);
            }

            66% {
                transform: translate(5%, 5%) rotate(-1deg);
            }
        }

        /* Floating Shapes */
        .floating-shapes {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .shape:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            top: 70%;
            right: 10%;
            animation-delay: 5s;
        }

        .shape:nth-child(3) {
            bottom: 20%;
            left: 20%;
            animation-delay: 10s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-30px) rotate(10deg);
            }
        }

        /* Login Container */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            position: relative;
            overflow: hidden;
            animation: cardAppear 0.6s ease-out;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Glow Effect */
        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, transparent 70%);
            animation: glowRotate 10s linear infinite;
            pointer-events: none;
        }

        @keyframes glowRotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 50%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 10px;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        .form-label {
            display: block;
            color: #e2e8f0;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
            transition: color 0.3s ease;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            color: #f1f5f9;
            font-size: 1rem;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #38bdf8;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        .form-input::placeholder {
            color: #64748b;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        .form-input:focus+.input-icon {
            color: #38bdf8;
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            background: none;
            border: none;
            padding: 0;
        }

        .password-toggle:hover {
            color: #38bdf8;
        }

        /* Options Row */
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .remember-me:hover {
            color: #e2e8f0;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #38bdf8;
            cursor: pointer;
        }

        .forgot-link {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .forgot-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            transition: width 0.3s ease;
        }

        .forgot-link:hover {
            color: #818cf8;
        }

        .forgot-link:hover::after {
            width: 100%;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            z-index: 1;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.5);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: #64748b;
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(148, 163, 184, 0.3), transparent);
        }

        .divider span {
            padding: 0 15px;
        }

        /* Social Login */
        .social-login {
            display: flex;
            gap: 15px;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 2px solid rgba(148, 163, 184, 0.2);
            background: rgba(15, 23, 42, 0.6);
            color: #94a3b8;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-btn:hover {
            border-color: #38bdf8;
            color: #38bdf8;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(56, 189, 248, 0.3);
        }

        /* Register Link */
        .register-link {
            text-align: center;
            margin-top: 30px;
            color: #94a3b8;
            font-size: 0.95rem;
            position: relative;
            z-index: 1;
        }

        .register-link a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .register-link a:hover {
            color: #818cf8;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }

        /* Back Link */
        .back-link {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #94a3b8;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-link:hover {
            color: #38bdf8;
            transform: translateX(-5px);
        }

        /* Error Message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            animation: shake 0.5s ease;
        }

        .error-message.show {
            display: flex;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        /* Success Animation */
        .success-checkmark {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        .success-checkmark.show {
            display: block;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            from {
                transform: translate(-50%, -50%) scale(0);
            }

            to {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .checkmark-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981, #34d399);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px -10px rgba(16, 185, 129, 0.5);
        }

        .checkmark-icon {
            color: white;
            font-size: 2rem;
        }

        /* Loader */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 1000;
        }

        .loader-overlay.show {
            display: flex;
        }

        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(56, 189, 248, 0.1);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loader-text {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 40px 25px;
                margin: 15px;
            }

            .logo {
                font-size: 2rem;
            }

            .back-link {
                top: 20px;
                left: 20px;
            }
        }

        /* Input Animation on Load */
        .form-group {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s ease forwards;
        }

        .form-group:nth-child(1) {
            animation-delay: 0.1s;
        }

        .form-group:nth-child(2) {
            animation-delay: 0.2s;
        }

        .options-row {
            animation-delay: 0.3s;
        }

        .submit-btn {
            animation-delay: 0.4s;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- Loader -->
    <div class="loader-overlay" id="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Вход в систему...</div>
    </div>

    <!-- Background Animation -->
    <div class="bg-animation"></div>

    <!-- Floating Shapes -->
    <div class="floating-shapes">
        <div class="shape"><i class="fas fa-cube" style="font-size: 100px; color: rgba(255,255,255,0.1);"></i></div>
        <div class="shape"><i class="fas fa-hammer" style="font-size: 80px; color: rgba(255,255,255,0.1);"></i></div>
        <div class="shape"><i class="fas fa-hard-hat" style="font-size: 120px; color: rgba(255,255,255,0.1);"></i></div>
    </div>

    <!-- Back Link -->
    <a href="./index.html" class="back-link">
        <i class="fas fa-arrow-left"></i>
        <span>На главную</span>
    </a>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Success Checkmark -->
            <div class="success-checkmark" id="successCheckmark">
                <div class="checkmark-circle">
                    <i class="fas fa-check checkmark-icon"></i>
                </div>
            </div>

            <!-- Logo -->
            <div class="logo-section">
                <a href="./index.html" class="logo">GlobalBuild</a>
                <p class="subtitle">Вход в личный кабинет</p>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Неверный email или пароль</span>
            </div>

            <!-- Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="form-input" placeholder="your@email.com" required
                            autocomplete="email">
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Пароль</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="••••••••" required
                            autocomplete="current-password">
                        <i class="fas fa-lock input-icon"></i>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="options-row">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Запомнить меня</span>
                    </label>
                    <a href="#" class="forgot-link" onclick="forgotPassword()">Забыли пароль?</a>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span>Войти</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>или войти через</span>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <button class="social-btn" title="Google" onclick="socialLogin('google')">
                    <i class="fab fa-google"></i>
                </button>
                <button class="social-btn" title="VK" onclick="socialLogin('vk')">
                    <i class="fab fa-vk"></i>
                </button>
                <button class="social-btn" title="Telegram" onclick="socialLogin('telegram')">
                    <i class="fab fa-telegram-plane"></i>
                </button>
            </div>

            <!-- Register Link -->
            <div class="register-link">
                Еще нет аккаунта? <a href="./register.html">Зарегистрироваться</a>
            </div>
        </div>
    </div>

    <script>
        // Password toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });

        // Form submission
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const submitBtn = document.getElementById('submitBtn');
        const successCheckmark = document.getElementById('successCheckmark');
        const loader = document.getElementById('loader');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = passwordInput.value;
            const rememberMe = document.getElementById('rememberMe').checked;

            // Hide error
            errorMessage.classList.remove('show');

            // Show loader
            loader.classList.add('show');

            // Simulate API delay
            await new Promise(resolve => setTimeout(resolve, 1500));

            // Check if user exists in localStorage
            const users = JSON.parse(localStorage.getItem('gb_users') || '[]');
            const user = users.find(u => u.email === email);

            if (!user) {
                loader.classList.remove('show');
                showError('Пользователь с таким email не найден. Зарегистрируйтесь!');
                return;
            }

            // Check password (in real app, compare hashed passwords)
            if (user.password !== password) {
                loader.classList.remove('show');
                showError('Неверный пароль');
                return;
            }

            // Success! Save current user
            const currentUser = {
                email: user.email,
                fullName: user.fullName,
                initials: getInitials(user.fullName),
                company: user.company,
                city: user.city,
                phone: user.phone
            };

            localStorage.setItem('gb_currentUser', JSON.stringify(currentUser));
            localStorage.setItem('userLoggedIn', 'true');

            // Hide loader, show success
            loader.classList.remove('show');
            successCheckmark.classList.add('show');

            // Redirect to dashboard after short delay
            setTimeout(() => {
                window.location.href = './dashboard.html';
            }, 1000);
        });

        function getInitials(fullName) {
            if (!fullName) return 'П';
            const parts = fullName.split(' ');
            if (parts.length >= 2) {
                return (parts[0][0] + parts[1][0]).toUpperCase();
            }
            return parts[0][0].toUpperCase();
        }

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');

            // Shake animation
            const card = document.querySelector('.login-card');
            card.style.animation = 'shake 0.5s ease';
            setTimeout(() => {
                card.style.animation = '';
            }, 500);
        }

        function socialLogin(provider) {
            alert(`Вход через ${provider} будет доступен скоро!`);
        }

        function forgotPassword() {
            const email = document.getElementById('email').value;
            if (!email) {
                showError('Введите email для восстановления пароля');
                return;
            }
            alert(`Ссылка для восстановления пароля отправлена на ${email}`);
        }

        // Check if already logged in
        window.addEventListener('load', () => {
            const isLoggedIn = localStorage.getItem('userLoggedIn');
            if (isLoggedIn === 'true') {
                // Already logged in, redirect to dashboard
                window.location.href = './dashboard.html';
            }
        });

        // Input focus effects
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.input-icon').style.color = '#38bdf8';
            });

            input.addEventListener('blur', () => {
                if (!input.value) {
                    input.parentElement.querySelector('.input-icon').style.color = '#64748b';
                }
            });
        });
    </script>
</body>

</html>
