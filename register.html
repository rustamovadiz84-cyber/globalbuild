<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - GlobalBuild</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(56, 189, 248, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(236, 72, 153, 0.05) 0%, transparent 50%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-5%, -5%) rotate(1deg); }
            66% { transform: translate(5%, 5%) rotate(-1deg); }
        }

        /* Floating Shapes */
        .floating-shapes {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .shape:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .shape:nth-child(2) { top: 70%; right: 10%; animation-delay: 5s; }
        .shape:nth-child(3) { bottom: 20%; left: 20%; animation-delay: 10s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }

        /* Back Link */
        .back-link {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #94a3b8;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-link:hover {
            color: #38bdf8;
            transform: translateX(-5px);
        }

        /* Main Container */
        .register-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
        }

        .register-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            position: relative;
            overflow: hidden;
            animation: cardAppear 0.6s ease-out;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Glow Effect */
        .register-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, transparent 70%);
            animation: glowRotate 10s linear infinite;
            pointer-events: none;
        }

        @keyframes glowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 50%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 8px;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 300;
        }

        /* Progress Steps */
        .progress-steps {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .step-number {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(148, 163, 184, 0.2);
            border: 2px solid rgba(148, 163, 184, 0.3);
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .step.active .step-number {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            border-color: transparent;
            color: white;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .step.completed .step-number {
            background: #10b981;
            border-color: transparent;
            color: white;
        }

        .step-label {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 500;
        }

        .step.active .step-label {
            color: #38bdf8;
        }

        /* Form Styles */
        .form-step {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .form-step.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .form-label {
            display: block;
            color: #e2e8f0;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .required {
            color: #f87171;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px 14px 48px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            color: #f1f5f9;
            font-size: 0.95rem;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #38bdf8;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        .form-input::placeholder {
            color: #64748b;
        }

        .form-input.error {
            border-color: #f87171;
            background: rgba(239, 68, 68, 0.1);
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .form-input:focus + .input-icon {
            color: #38bdf8;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: none;
            border: none;
            padding: 0;
        }

        .password-toggle:hover {
            color: #38bdf8;
        }

        /* Password Strength */
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .password-strength.show {
            display: block;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .strength-text {
            font-size: 0.75rem;
            margin-top: 5px;
            color: #64748b;
        }

        /* Error Message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            animation: shake 0.5s ease;
        }

        .error-message.show {
            display: flex;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 25px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #38bdf8;
            cursor: pointer;
            margin-top: 2px;
        }

        .checkbox-label {
            color: #94a3b8;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .checkbox-label a {
            color: #38bdf8;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .checkbox-label a:hover {
            color: #818cf8;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            color: white;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.5);
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid rgba(148, 163, 184, 0.3);
            color: #94a3b8;
        }

        .btn-secondary:hover {
            border-color: #38bdf8;
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
        }

        /* Success State */
        .success-state {
            display: none;
            text-align: center;
            padding: 40px 20px;
            animation: scaleIn 0.5s ease;
        }

        .success-state.show {
            display: block;
        }

        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #10b981, #34d399);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 10px 40px -10px rgba(16, 185, 129, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .success-icon i {
            color: white;
            font-size: 3rem;
        }

        .success-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #f1f5f9;
            margin-bottom: 15px;
        }

        .success-text {
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #64748b;
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(148, 163, 184, 0.3), transparent);
        }

        .divider span {
            padding: 0 15px;
        }

        /* Social Login */
        .social-login {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid rgba(148, 163, 184, 0.2);
            background: rgba(15, 23, 42, 0.6);
            color: #94a3b8;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .social-btn:hover {
            border-color: #38bdf8;
            color: #38bdf8;
            transform: translateY(-2px);
        }

        .social-btn span {
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Login Link */
        .login-link {
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .login-link a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: #818cf8;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }

        /* Loader */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }

        .loader-overlay.show {
            display: flex;
        }

        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(56, 189, 248, 0.1);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            color: #94a3b8;
            font-size: 1rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .register-card {
                padding: 30px 20px;
            }

            .logo {
                font-size: 1.8rem;
            }

            .back-link {
                top: 20px;
                left: 20px;
            }

            .btn-group {
                flex-direction: column;
            }

            .social-btn span {
                display: none;
            }
        }

        /* Animations */
        .form-group {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- Back Link -->
    <a href="./index.html" class="back-link">
        <i class="fas fa-arrow-left"></i>
        <span>На главную</span>
    </a>

    <!-- Background -->
    <div class="bg-animation"></div>
    <div class="floating-shapes">
        <div class="shape"><i class="fas fa-cube" style="font-size: 100px;"></i></div>
        <div class="shape"><i class="fas fa-hammer" style="font-size: 80px;"></i></div>
        <div class="shape"><i class="fas fa-hard-hat" style="font-size: 120px;"></i></div>
    </div>

    <!-- Loader -->
    <div class="loader-overlay" id="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Создаем ваш аккаунт...</div>
    </div>

    <!-- Main Container -->
    <div class="register-container">
        <div class="register-card">
            <!-- Logo -->
            <div class="logo-section">
                <a href="./index.html" class="logo">GlobalBuild</a>
                <p class="subtitle">Создайте аккаунт для доступа к каталогу</p>
            </div>

            <!-- Progress Steps -->
            <div class="progress-steps" id="progressSteps">
                <div class="step active" data-step="1">
                    <div class="step-number">1</div>
                    <div class="step-label">Аккаунт</div>
                </div>
                <div class="step" data-step="2">
                    <div class="step-number">2</div>
                    <div class="step-label">Профиль</div>
                </div>
                <div class="step" data-step="3">
                    <div class="step-number">3</div>
                    <div class="step-label">Готово</div>
                </div>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Произошла ошибка</span>
            </div>

            <!-- Step 1: Account Info -->
            <form class="form-step active" id="step1Form">
                <div class="form-group" style="animation-delay: 0.1s">
                    <label class="form-label" for="regEmail">Email <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <input type="email" id="regEmail" class="form-input" placeholder="your@email.com" required>
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <div class="form-group" style="animation-delay: 0.2s">
                    <label class="form-label" for="regPassword">Пароль <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <input type="password" id="regPassword" class="form-input" placeholder="Минимум 8 символов" required>
                        <i class="fas fa-lock input-icon"></i>
                        <button type="button" class="password-toggle" onclick="togglePassword('regPassword', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                </div>

                <div class="form-group" style="animation-delay: 0.3s">
                    <label class="form-label" for="confirmPassword">Подтвердите пароль <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" class="form-input" placeholder="Повторите пароль" required>
                        <i class="fas fa-lock input-icon"></i>
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="button" class="btn btn-secondary" onclick="location.href='./login.html'">Уже есть аккаунт</button>
                    <button type="submit" class="btn btn-primary">Далее <i class="fas fa-arrow-right" style="margin-left: 8px;"></i></button>
                </div>
            </form>

            <!-- Step 2: Profile Info -->
            <form class="form-step" id="step2Form">
                <div class="form-group">
                    <label class="form-label" for="fullName">ФИО <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <input type="text" id="fullName" class="form-input" placeholder="Иванов Иван Иванович" required>
                        <i class="fas fa-user input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">Телефон <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <input type="tel" id="phone" class="form-input" placeholder="+7 (999) 123-45-67" required>
                        <i class="fas fa-phone input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="company">Компания</label>
                    <div class="input-wrapper">
                        <input type="text" id="company" class="form-input" placeholder="Название организации">
                        <i class="fas fa-building input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="city">Город</label>
                    <div class="input-wrapper">
                        <input type="text" id="city" class="form-input" placeholder="Москва">
                        <i class="fas fa-map-marker-alt input-icon"></i>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="agreeTerms" required>
                    <label class="checkbox-label" for="agreeTerms">
                        Я согласен с <a href="#">Условиями использования</a> и <a href="#">Политикой конфиденциальности</a> <span class="required">*</span>
                    </label>
                </div>

                <div class="btn-group">
                    <button type="button" class="btn btn-secondary" onclick="prevStep()"><i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Назад</button>
                    <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                </div>
            </form>

            <!-- Step 3: Success -->
            <div class="success-state" id="successState">
                <div class="success-icon">
                    <i class="fas fa-check"></i>
                </div>
                <h2 class="success-title">Добро пожаловать!</h2>
                <p class="success-text">
                    Ваш аккаунт успешно создан.<br>
                    Теперь вы можете войти в систему.
                </p>
                <button class="btn btn-primary" onclick="location.href='./login.html'" style="width: 100%;">
                    Войти в аккаунт
                </button>
            </div>

            <!-- Social Login (only on step 1) -->
            <div id="socialSection">
                <div class="divider"><span>или</span></div>
                <div class="social-login">
                    <button class="social-btn" onclick="socialLogin('google')">
                        <i class="fab fa-google"></i>
                        <span>Google</span>
                    </button>
                    <button class="social-btn" onclick="socialLogin('vk')">
                        <i class="fab fa-vk"></i>
                        <span>VK</span>
                    </button>
                    <button class="social-btn" onclick="socialLogin('telegram')">
                        <i class="fab fa-telegram-plane"></i>
                        <span>Telegram</span>
                    </button>
                </div>
            </div>

            <!-- Login Link -->
            <div class="login-link" id="loginLinkSection">
                Уже есть аккаунт? <a href="./login.html">Войти</a>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1;
        const formData = {};

        // Password toggle
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            btn.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        }

        // Password strength checker
        const passwordInput = document.getElementById('regPassword');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        const passwordStrength = document.getElementById('passwordStrength');

        passwordInput.addEventListener('input', (e) => {
            const password = e.target.value;
            
            if (password.length > 0) {
                passwordStrength.classList.add('show');
                
                let strength = 0;
                if (password.length >= 8) strength++;
                if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
                if (password.match(/[0-9]/)) strength++;
                if (password.match(/[^a-zA-Z0-9]/)) strength++;

                const colors = ['#f87171', '#fbbf24', '#34d399', '#10b981'];
                const texts = ['Слабый', 'Средний', 'Хороший', 'Отличный'];
                
                strengthBar.style.width = ((strength + 1) / 4 * 100) + '%';
                strengthBar.style.background = colors[strength];
                strengthText.textContent = texts[strength];
                strengthText.style.color = colors[strength];
            } else {
                passwordStrength.classList.remove('show');
            }
        });

        // Step 1 Form
        document.getElementById('step1Form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('regEmail').value;
            const password = passwordInput.value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validation
            if (password.length < 8) {
                showError('Пароль должен содержать минимум 8 символов');
                return;
            }

            if (password !== confirmPassword) {
                showError('Пароли не совпадают');
                return;
            }

            // Check if email already exists
            const users = JSON.parse(localStorage.getItem('gb_users') || '[]');
            if (users.find(u => u.email === email)) {
                showError('Пользователь с таким email уже существует. Перейдите на страницу входа.');
                return;
            }

            // Save data
            formData.email = email;
            formData.password = password;

            nextStep();
        });

        // Step 2 Form
        document.getElementById('step2Form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            const company = document.getElementById('company').value;
            const city = document.getElementById('city').value;

            if (!document.getElementById('agreeTerms').checked) {
                showError('Необходимо согласиться с условиями использования');
                return;
            }

            // Save profile data
            formData.fullName = fullName;
            formData.phone = phone;
            formData.company = company;
            formData.city = city;
            formData.registrationDate = new Date().toISOString();

            // Show loader
            document.getElementById('loader').classList.add('show');

            // Simulate API call
            await new Promise(resolve => setTimeout(resolve, 2000));

            // Save to localStorage
            const users = JSON.parse(localStorage.getItem('gb_users') || '[]');
            users.push(formData);
            localStorage.setItem('gb_users', JSON.stringify(users));

            // Hide loader
            document.getElementById('loader').classList.remove('show');

            // Show success
            nextStep();
        });

        function nextStep() {
            // Hide current step
            document.querySelector('.form-step.active').classList.remove('active');
            
            // Update progress
            document.querySelector(`.step[data-step="${currentStep}"]`).classList.remove('active');
            document.querySelector(`.step[data-step="${currentStep}"]`).classList.add('completed');
            
            currentStep++;
            
            if (currentStep === 3) {
                // Show success
                document.getElementById('successState').classList.add('show');
                document.getElementById('progressSteps').style.display = 'none';
                document.getElementById('socialSection').style.display = 'none';
                document.getElementById('loginLinkSection').style.display = 'none';
                document.getElementById('errorMessage').style.display = 'none';
            } else {
                // Show next step
                document.querySelector(`.step[data-step="${currentStep}"]`).classList.add('active');
                document.getElementById(`step${currentStep}Form`).classList.add('active');
                
                // Hide social on step 2
                if (currentStep === 2) {
                    document.getElementById('socialSection').style.display = 'none';
                }
            }
        }

        function prevStep() {
            document.querySelector('.form-step.active').classList.remove('active');
            document.querySelector(`.step[data-step="${currentStep}"]`).classList.remove('active');
            
            currentStep--;
            
            document.querySelector(`.step[data-step="${currentStep}"]`).classList.add('active');
            document.getElementById(`step${currentStep}Form`).classList.add('active');
            
            // Show social on step 1
            if (currentStep === 1) {
                document.getElementById('socialSection').style.display = 'block';
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            document.getElementById('errorText').textContent = message;
            errorEl.classList.add('show');
            
            setTimeout(() => {
                errorEl.classList.remove('show');
            }, 5000);
        }

        function socialLogin(provider) {
            alert(`Вход через ${provider} будет доступен скоро!`);
        }

        // Phone mask
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 0) {
                if (value[0] === '7' || value[0] === '8') {
                    value = value.substring(1);
                }
                let formattedValue = '+7';
                if (value.length > 0) formattedValue += ' (' + value.substring(0, 3);
                if (value.length >= 3) formattedValue += ') ' + value.substring(3, 6);
                if (value.length >= 6) formattedValue += '-' + value.substring(6, 8);
                if (value.length >= 8) formattedValue += '-' + value.substring(8, 10);
                e.target.value = formattedValue;
            }
        });
    </script>
</body>
</html>
